apiVersion: batch/v1
kind: CronJob
metadata:
  name: stevedore
  namespace: ops
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          serviceAccountName: stevedore
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            fsGroup: 65532
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: stevedore
              image: ghcr.io/advailo/stevedore:v0.1.0
              command: ["python", "index.py"]
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              env:
                - name: CLUSTER_NAME
                  value: "my-ecs-cluster"
                - name: DISRUPTION_BUDGET_PERCENT
                  value: "30"
                - name: DRY_RUN
                  value: "false"
                - name: MAX_INSTANCE_AGE_DAYS
                  value: "30"
                - name: MIN_INSTANCE_AGE_MINUTES
                  value: "15"
                - name: MIN_INSTANCES_PER_AZ
                  value: "1"
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
