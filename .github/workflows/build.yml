name: Build

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
      - run: pip install pytest
      - run: python -m pytest test_index.py -v

  build:
    name: Build (${{ matrix.tag-suffix }})
    needs: test
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      security-events: write
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            tag-suffix: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            tag-suffix: arm64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build (load locally for scanning)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          load: true
          tags: stevedore:${{ matrix.tag-suffix }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: stevedore:${{ matrix.tag-suffix }}
          format: sarif
          output: trivy-image.sarif
          severity: HIGH,CRITICAL
          scanners: vuln,secret,misconfig
          exit-code: 0

      - name: Upload to GitHub Security
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image-${{ matrix.tag-suffix }}
