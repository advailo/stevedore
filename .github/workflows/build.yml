name: Build

on:
  push:
    branches: ["main"]
  pull_request:

permissions: {}

jobs:
  build:
    name: Build (${{ matrix.tag-suffix }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      security-events: write
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            tag-suffix: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            tag-suffix: arm64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build (load locally for scanning)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          load: true
          tags: stevedore:${{ matrix.tag-suffix }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: stevedore:${{ matrix.tag-suffix }}
          format: sarif
          output: trivy-image.sarif
          severity: HIGH,CRITICAL
          scanners: vuln,secret,misconfig
          exit-code: 0

      - name: Upload to GitHub Security
        uses: github/codeql-action/upload-sarif@f52b05f4acaaa234e44466e66d29050e135ea9ef # v4.36.0
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image-${{ matrix.tag-suffix }}
