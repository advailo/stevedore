name: Promote to latest

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to promote (e.g. v0.1.0)"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  promote:
    name: Promote ${{ inputs.version }} → latest
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2
        with:
          registry-type: public

      - name: Promote image to latest
        env:
          VERSION: ${{ inputs.version }}
        run: |
          REPO=public.ecr.aws/advailo/stevedore
          docker buildx imagetools create \
            -t ${REPO}:latest \
            ${REPO}:${VERSION}-amd64 \
            ${REPO}:${VERSION}-arm64

      - name: Mark GitHub Release as latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit ${{ inputs.version }} --latest
