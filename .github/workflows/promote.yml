name: Promote to latest

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to promote (e.g. v0.1.0)"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  promote:
    name: Promote ${{ inputs.version }} → latest
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2
        with:
          registry-type: public

      - name: Promote image to latest
        env:
          VERSION: ${{ inputs.version }}
        run: |
          REPO=public.ecr.aws/advailo/stevedore
          docker buildx imagetools create \
            -t ${REPO}:latest \
            ${REPO}:${VERSION}-amd64 \
            ${REPO}:${VERSION}-arm64

      - name: Mark GitHub Release as latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit ${{ inputs.version }} --latest
