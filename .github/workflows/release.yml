name: Release

on:
  push:
    tags: ["v*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
      - run: pip install pytest
      - run: python -m pytest test_index.py -v

  build:
    name: Build (${{ matrix.tag-suffix }})
    runs-on: ${{ matrix.runner }}
    needs: test
    permissions:
      contents: read
      id-token: write
      security-events: write
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            tag-suffix: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            tag-suffix: arm64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2
        with:
          registry-type: public

      - name: Build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          load: true
          platforms: ${{ matrix.platform }}
          tags: stevedore:${{ matrix.tag-suffix }}

      - name: Scan image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: stevedore:${{ matrix.tag-suffix }}
          format: sarif
          output: trivy-image.sarif
          severity: HIGH,CRITICAL
          scanners: vuln,secret,misconfig
          exit-code: 0

      - name: Upload to GitHub Security
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image-${{ matrix.tag-suffix }}

      - name: Push to ECR Public
        run: |
          docker tag stevedore:${{ matrix.tag-suffix }} public.ecr.aws/advailo/stevedore:${{ github.ref_name }}-${{ matrix.tag-suffix }}
          docker push public.ecr.aws/advailo/stevedore:${{ github.ref_name }}-${{ matrix.tag-suffix }}

  merge:
    name: Merge manifests
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
    steps:
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2
        with:
          registry-type: public

      - name: Create versioned manifests
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          MAJOR_MINOR=$(echo $VERSION | cut -d. -f1,2)
          MAJOR=$(echo $VERSION | cut -d. -f1)
          REPO=public.ecr.aws/advailo/stevedore

          docker buildx imagetools create \
            -t ${REPO}:${VERSION} \
            -t ${REPO}:${MAJOR_MINOR} \
            -t ${REPO}:${MAJOR} \
            ${REPO}:${VERSION}-amd64 \
            ${REPO}:${VERSION}-arm64

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: merge
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Package Terraform module
        run: zip -r terraform-module.zip terraform/

      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          generate_release_notes: true
          files: |
            terraform-module.zip
            examples/cloudformation/template.yaml
          body: |
            ## Container image

            ```
            public.ecr.aws/advailo/stevedore:${{ github.ref_name }}
            ```

            > **Lambda users:** Lambda does not support multi-arch manifest lists. Use the arch-specific tag:
            > `public.ecr.aws/advailo/stevedore:${{ github.ref_name }}-amd64` or `-arm64`

            ## Terraform module

            Lambda requires a private ECR image. Mirror first:
            ```bash
            docker pull public.ecr.aws/advailo/stevedore:${{ github.ref_name }}-amd64
            docker tag public.ecr.aws/advailo/stevedore:${{ github.ref_name }}-amd64 \
              123456789012.dkr.ecr.<region>.amazonaws.com/stevedore:${{ github.ref_name }}
            docker push 123456789012.dkr.ecr.<region>.amazonaws.com/stevedore:${{ github.ref_name }}
            ```

            ```hcl
            module "stevedore" {
              source   = "github.com/advailo/stevedore//terraform?ref=${{ github.ref_name }}"
              image_uri = "123456789012.dkr.ecr.<region>.amazonaws.com/stevedore:${{ github.ref_name }}"
            }
            ```

            ## CloudFormation

            Deploy `template.yaml` attached below, or:

            ```bash
            aws cloudformation deploy \
              --template-file template.yaml \
              --stack-name stevedore \
              --capabilities CAPABILITY_NAMED_IAM \
              --parameter-overrides \
                ImageUri=123456789012.dkr.ecr.<region>.amazonaws.com/stevedore:${{ github.ref_name }} \
                EcsClusterName=my-cluster \
                EcsClusterArn=arn:aws:ecs:us-east-1:123456789012:cluster/my-cluster \
                VpcId=vpc-xxx \
                SubnetIds=subnet-aaa,subnet-bbb
            ```
