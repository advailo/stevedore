name: Release

on:
  push:
    tags: ["v*"]

permissions: {}

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
      - run: pip install pytest
      - run: python -m pytest test_index.py -v

  build:
    name: Build (${{ matrix.tag-suffix }})
    runs-on: ${{ matrix.runner }}
    needs: test
    permissions:
      contents: read
      packages: write
      security-events: write
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            tag-suffix: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            tag-suffix: arm64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.ref_name }}-${{ matrix.tag-suffix }}

      - name: Pull image for scanning
        run: docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}-${{ matrix.tag-suffix }}

      - name: Scan image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: ghcr.io/${{ github.repository }}:${{ github.ref_name }}-${{ matrix.tag-suffix }}
          format: sarif
          output: trivy-image.sarif
          severity: HIGH,CRITICAL
          scanners: vuln,secret,misconfig
          exit-code: 0

      - name: Upload to GitHub Security
        uses: github/codeql-action/upload-sarif@f52b05f4acaaa234e44466e66d29050e135ea9ef # v4.36.0
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image-${{ matrix.tag-suffix }}

  merge:
    name: Merge manifests
    runs-on: ubuntu-latest
    needs: build
    permissions:
      packages: write
    steps:
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Create versioned and latest manifests
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          MAJOR_MINOR=$(echo $VERSION | cut -d. -f1,2)
          MAJOR=$(echo $VERSION | cut -d. -f1)
          REPO=ghcr.io/${{ github.repository }}

          docker buildx imagetools create \
            -t ${REPO}:${VERSION} \
            -t ${REPO}:${MAJOR_MINOR} \
            -t ${REPO}:${MAJOR} \
            ${REPO}:${VERSION}-amd64 \
            ${REPO}:${VERSION}-arm64

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: merge
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Package Terraform module
        run: zip -r terraform-module.zip terraform/

      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          generate_release_notes: true
          files: |
            terraform-module.zip
            examples/cloudformation/template.yaml
          body: |
            ## Container image

            ```
            ghcr.io/advailo/stevedore:${{ github.ref_name }}
            ```

            ## Terraform module

            ```hcl
            module "stevedore" {
              source   = "github.com/advailo/stevedore//terraform?ref=${{ github.ref_name }}"
              image_uri = "ghcr.io/advailo/stevedore:${{ github.ref_name }}"
            }
            ```

            ## CloudFormation

            Deploy `template.yaml` attached below, or:

            ```bash
            aws cloudformation deploy \
              --template-file template.yaml \
              --stack-name stevedore \
              --capabilities CAPABILITY_NAMED_IAM \
              --parameter-overrides \
                ImageUri=ghcr.io/advailo/stevedore:${{ github.ref_name }} \
                EcsClusterName=my-cluster \
                EcsClusterArn=arn:aws:ecs:us-east-1:123456789012:cluster/my-cluster \
                VpcId=vpc-xxx \
                SubnetIds=subnet-aaa,subnet-bbb
            ```
